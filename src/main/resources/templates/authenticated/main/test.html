<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../../../static/css/tailwind-output.css"/>

</head>
<body class="">

    <div id="main-head" class="flex flex-col h-10vh w-[97.5%] items-center">

        <div id="head-title" class="self-start flex">
            <h2>Pending Tasks : </h2>
            <div>
                <h2 id="total-tasks">0</h2>
            </div>
        </div>

        <div class="flex justify-between w-full">
            <p>To-do list :</p>

            <div id="sort-container" class="flex gap-4">
                <p>Sort By:</p>
                <select onchange="SortBy.sortProcess()" name="sort">
                    <option value="d-m">Date Modified</option>
                    <option value="title">Title</option>
                    <option value="t-d">Target Date</option>
                </select>
            </div>

        </div>
            
    </div>
    

</body>
</html>
