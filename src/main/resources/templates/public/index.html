<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
    <head>
        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta property="og:title" content="PEA TO-DO LIST APPLICATION"/>
        <meta property="og:description" content="A simple and intuitive to-do list application designed to help you organize tasks, boost productivity, and keep track of your daily activities"/>
        <meta property="og:image" content="https://www.pea-todo-list-application.onrender.com/static/images/checklist.png"/>
        <meta property="og:url" content="https://www.pea-todo-list-application.onrender.com"/>

        <title>P E A - log in or sign up</title>

        <link rel="preload" href="/images/showPassword/open.svg" as="image">

        <link rel="preload" href="/images/showPassword/close.svg" as="image">

        <link rel="icon" type="icon" th:href="@{/images/checklist.ico}" />

        <link rel="stylesheet" th:href="@{/css/public/index.css}" />

        <link rel="stylesheet" th:href="@{/css/mediaQueries/index.css}" />

    </head>
    <body>

        <div id="prompt-message">

        </div>
        
        <header class="container">
            <h1>PEA TO-DO LIST APPLICATION</h1>
            <hr/>
        </header>

        <main class="container">
            <div id="main-page">
                <div id="advertisement">
                    <h1>Plan,</h1>
                    <h1>Execute,</h1>
                    <h1>Achieve.</h1>
                </div>
        
                <div id="login-page">

                    <form th:object="${user}" th:action="@{/login}" method="post" sec:csrf="true">

                        <input th:field="*{username}" required="required" class="login-input" type="text" placeholder="Username"/>

                        <div class="login-input" id="password-container">
                            <input oninput="onInputPassword(event,'show-password-image','password')" id="password"
                                   required="required" th:field="*{password}" type="password" minlength="8" placeholder="Password"/>
                            <img id="show-password-image" th:src="@{/images/showPassword/close.svg}" alt="Toggle Password"/>

                        </div>
                        
                        <button id="login-button" class="buttons" type="submit">LOG IN</button>
                    </form>

                    <div id="forgot-password-container">
                        <a href="/forgot-password">Forgot password?</a>
                        <hr/>
                    </div>
                    
                    <button class="buttons" id="create-new-account-button">Create new account</button>

                </div>

            </div>
            
        </main>

        <div id="create-new-account-container">

            <span id="closeContainer">&times</span>

            <div id="create-new-account-titles">
                <h1>Sign Up</h1>
                <p>It's quick and easy.</p>
            </div>

            <hr/>

            <form th:object="${user}" th:action="@{/create-account}" method="post" sec:csrf="true" onsubmit="return validateForm()">

                <div id="create-new-account-names">
                    <input maxlength="35" required="required" autofocus="autofocus"  th:field="*{firstName}" type="text"
                           placeholder="First name"/>
                    <input maxlength="35" required="required"  th:field="*{lastName}" type="text" placeholder="Last name"/>
                </div>
                
                <input required="required"  th:field="*{email}" type="email" placeholder="Enter your email address"/>
                <input maxlength="25" required="required"  th:field="*{username}" type="text" placeholder="Create a username"/>
                
                <div id="create-account-password-container">
                    <input minlength="8" id="create-new-password"
                           oninput="onInputPassword(event,'show-password-image-create-account','create-new-password')" required="required"  th:field="*{password}" type="password" placeholder="Create a new password"/>
                           <img id="show-password-image-create-account" th:src="@{/images/showPassword/close.svg}" alt="Toggle Password"/>
                </div>

                
                <input minlength="8" required="required"  type="password" id="confirmPassword" placeholder="Re-enter your password"/>

                <div id="terms">
                    <p>People who use our service may have uploaded your contact information to PEA</p>
                    <p>By clicking Sign Up, you agree to our <a href="/terms">Terms, Privacy Policy and Cookies Policy</a>.</p>
                </div>

                <button id="sign-up-button">Sign Up</button>
            </form>

        </div>

        <footer class="container" >PEA &copy; 2024</footer>
        
        <script th:src="@{/js/public/index.js}"></script>
        
        <script>

            let createAccMessage = `[[${createAccMessage}]]`;
            createAccountMessage(createAccMessage);

            let loginFailedMessage = `[[${loginFailedMessage}]]`;
            handleLoginFailedMessage(loginFailedMessage);

            let logoutMessage = `[[${logoutMessage}]]`;
            handleLogoutMessage(logoutMessage);

        </script>
        
    </body>
</html>
